# Site Settings
title: "Aging Health"
email: "your-email@domain.com"
description: >-
  Independent health research and patient advocacy for seniors. 
  Focusing on metabolic wellness and heart health recovery.

baseurl: "" 
url: "https://tomglo10.github.io" 
repository: "tomglo10/tomglo10.github.io"

# Header & Author
header_image: assets/profile.png
author: "Tommy T. Douglas"
author_bio: >-
  Independent Health Researcher & Patient Advocate. Heart attack survivor (2008).
author_pic: "/assets/images/tommy.jpg"



# Build settings
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-remote-theme # Added this to ensure the theme actually downloads

# Collections
collections:
  pages:
    output: true
    permalink: /:title
  notes:
    output: true
    permalink: /notes/:title
  journals:
    output: true
    permalink: /journals/:title

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author_profile: true
