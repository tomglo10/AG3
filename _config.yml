# Site settings
title: "Aging Health"
email: "your-email@domain.com"
description: >-
  Independent health research and patient advocacy for seniors. 
  Focusing on metabolic wellness, heart health recovery, and evidence-based insights.

# Navigation Settings
baseurl: "" 
url: "https://tomglo10.github.io"
repository: "tomglo10/tomglo10.github.io"

# Author Information
author: "Tommy T. Douglas"
author_bio: >-
  Independent Health Researcher & Patient Advocate. Heart attack survivor (2008) 
  dedicated to sharing senior wellness research freely.
author_pic: "assets/profile.png"

# Theme Configuration
# Using "remote_theme" is the most reliable way for GitHub Pages
remote_theme: "just-the-docs/just-the-docs"

# Build settings
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme # This MUST be here to use Just the Docs
---
layout: post
title: "Understanding Metformin"
author: "Tommy T. Douglas"
avatar: "/assets/images/tommy.jpg"
---
# Collections (Keeps your research organized)
collections:
  pages:
    output: true
    permalink: /:title
  notes:
    output: true
    permalink: /notes/:title

# Default Layouts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author_profile: true
collections:
  notes:
    output: true
    permalink: /notes/:title
