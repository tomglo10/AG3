# Site settings
title: "Aging Health"
email: "your-email@domain.com"
description: >-
  Independent health research and patient advocacy for seniors. 
  Focusing on metabolic wellness, heart health recovery, and dementia prevention.

# Navigation & URLs
baseurl: "" 
url: "https://tomglo10.github.io"
repository: "tomglo10/AG4"

# Author Credentials
author: "Tommy T. Douglas"
author_bio: >-
  Independent Health Researcher & Patient Advocate. Heart attack survivor (2008).
author_pic: "/assets/profile.webp" # Ensure this file is in your assets folder
donate_link: "https://www.buymeacoffee.com/yourusername"

# Theme Configuration
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme
  - jekyll-paginate

# Collections Structure
collections:
  pages:
    output: true
    permalink: /:title
  notes:
    output: true
    permalink: /notes/:title
  journals:
    output: true
    permalink: /journals/:title

# Automated Layout Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "journals"
    values:
      layout: "journal-entry"
