<p class="research-meta" style="font-family: 'Open Sans', sans-serif; font-size: 0.9rem; color: #666;">
    <i class="far fa-calendar-alt"></i> 
    <strong>Published:</strong> 
    <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%B %-d, %Y" }}
    </time>

    {%- if page.modified_date -%}
    <span style="margin-left: 15px; padding: 2px 6px; background: #fff3cd; border-radius: 4px;">
        <i class="fas fa-sync-alt"></i> 
        <strong>Last Updated:</strong> 
        <time datetime="{{ page.modified_date | date_to_xmlschema }}" itemprop="dateModified">
            {{ page.modified_date | date: "%B %-d, %Y" }}
        </time>
    </span>
    {%- endif -%}

    <br />

    <i class="fas fa-user-md"></i> <strong>Researcher:</strong> {{ page.author }} 
    | 
    <i class="fas fa-tags"></i> 
    {%- for tag in page.tags -%}
        <a href="{{ '/tags/#' | append: tag | relative_url }}" style="color: #376a8c;">#{{ tag }}</a>&nbsp;
    {%- endfor -%}
</p>
