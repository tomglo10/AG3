
<p class="research-meta">
  {%- if page.author -%}
    <span class="author-label"><strong>Lead Researcher:</strong> {{ page.author }}</span>
  {%- endif -%}
  
  <br />
  
  {%- if page.tags -%}
    <span class="tags-label"><strong>Focus Areas:</strong></span>
    {%- for tag in page.tags -%}
      <a href="{{ '/tags/#' | append: tag | relative_url }}" class="tag-link">#{{ tag }}</a> 
    {%- endfor -%}
  {%- endif -%}
</p>
